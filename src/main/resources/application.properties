spring.application.name=studentmanagement
server.port=${PORT:8080}

# Database Configuration (Uses env vars for cloud, defaults to H2 for local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:student_mgmt_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (only for local development)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}