spring.application.name=studentmanagement

# Database Configuration (Uses env vars for cloud, defaults to H2 for local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:student_mgmt_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Console (Disabled in production usually, but kept for local)
spring.h2.console.enabled=true